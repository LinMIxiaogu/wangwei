[loggers]
keys=root

[handlers]
keys=consoleHandler,rotateFileHandler,errorFileHandler

[formatters]
keys=format1

[logger_root]
level=INFO
handlers=consoleHandler,rotateFileHandler,errorFileHandler

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=format1
args=(sys.stdout,)

[handler_rotateFileHandler]
class=concurrent_log_handler.ConcurrentTimedRotatingFileHandler
formatter=format1
args=('/home/q/www/default.qunar.com/logs/info.log', 'H', 1, 12, 'utf-8')

[handler_errorFileHandler]
class=concurrent_log_handler.ConcurrentTimedRotatingFileHandler
formatter=format1
level=ERROR
args=('/home/q/www/default.qunar.com/logs/error.log', 'H', 1, 12, 'utf-8')

[formatter_format1]
format=[%(asctime)s] %(levelname)s in %(filename)s:%(lineno)d - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
